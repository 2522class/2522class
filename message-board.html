<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言板 · 临汾一中2522班</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f1e6;
    --paper-dark: #ece4d2;
    --ink: #2a2620;
    --ink-soft: #6b6255;
    --flag-red: #b5342a;
    --uniform-navy: #2c3e56;
    --uniform-navy-light: #3f5474;
    --hairline: rgba(42,38,32,0.18);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  hr.rule { border: none; border-top: 1px solid var(--hairline); margin: 0; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s cubic-bezier(.2,.7,.3,1), transform 0.7s cubic-bezier(.2,.7,.3,1); }
  .reveal.in-view { opacity: 1; transform: translateY(0); }

  /* ---- Nav ---- */
  nav {
    position: sticky; top: 0; z-index: 10;
    background: rgba(246,241,230,0.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--hairline);
  }
  nav .wrap { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; max-width: 1000px; }
  .nav-brand { font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 16px; letter-spacing: 0.05em; }
  .nav-links a {
    font-size: 13px; color: var(--ink-soft); text-decoration: none;
    letter-spacing: 0.03em; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--flag-red); }

  /* ---- Hero ---- */
  .board-hero { padding: 72px 0 40px; text-align: center; }
  .eyebrow {
    font-size: 13px; letter-spacing: 0.35em; color: var(--flag-red); font-weight: 500; margin: 0 0 18px;
  }
  .board-hero h1 {
    font-family: 'Noto Serif SC', serif; font-weight: 900;
    font-size: clamp(28px, 5vw, 42px); margin: 0 0 16px;
  }
  .board-hero p {
    font-size: 14.5px; color: var(--ink-soft); line-height: 1.9;
    max-width: 440px; margin: 0 auto;
  }
  .seal-float {
    width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid var(--flag-red);
    display: flex; align-items: center; justify-content: center; margin: 24px auto 0;
    color: var(--flag-red); font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 16px;
    animation: float 3.5s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  /* ---- Form ---- */
  .board-form-sec { padding: 24px 0 56px; }
  .form-card {
    background: #fff; border: 1px solid var(--hairline); padding: 32px;
    box-shadow: 0 1px 3px rgba(42,38,32,0.1);
  }
  .form-row { margin-bottom: 18px; }
  .form-row label {
    display: block; font-size: 12.5px; color: var(--ink-soft);
    letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%; font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
    padding: 12px 14px; border: 1px solid var(--hairline); background: var(--paper);
    color: var(--ink); transition: border-color 0.25s, background 0.25s;
  }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
    outline: none; border-color: var(--flag-red); background: #fff;
  }
  .form-row textarea { resize: vertical; min-height: 90px; line-height: 1.7; }
  .form-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; }
  .char-count { font-size: 12px; color: var(--ink-soft); }
  .submit-btn {
    font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 500;
    color: #fff; background: var(--uniform-navy); border: none; padding: 12px 30px;
    cursor: pointer; letter-spacing: 0.03em; transition: background 0.25s, transform 0.15s;
  }
  .submit-btn:hover { background: var(--uniform-navy-light); }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-note {
    font-size: 12px; color: var(--ink-soft); margin-top: 14px; line-height: 1.8;
    padding-top: 14px; border-top: 1px dashed var(--hairline);
  }
  .form-note code {
    background: var(--paper-dark); padding: 1px 6px; border-radius: 3px;
    font-size: 11.5px; color: var(--flag-red);
  }

  /* ---- Message list ---- */
  .board-list-sec { padding: 0 0 80px; }
  .sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; }
  .sec-head h2 { font-family: 'Noto Serif SC', serif; font-size: 21px; font-weight: 700; margin: 0; }
  .sec-head span { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.05em; }

  .msg-list { list-style: none; margin: 0; padding: 0; }
  .msg-item {
    background: #fff; border: 1px solid var(--hairline); padding: 20px 22px;
    margin-bottom: 16px; opacity: 0; transform: translateY(14px);
    animation: msgIn 0.5s ease-out forwards;
  }
  @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }
  .msg-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .msg-author { font-family: 'Noto Serif SC', serif; font-weight: 600; font-size: 14.5px; color: var(--uniform-navy); }
  .msg-time { font-size: 11.5px; color: var(--ink-soft); }
  .msg-body { font-size: 14px; line-height: 1.8; color: var(--ink); white-space: pre-wrap; }
  .msg-foot { margin-top: 10px; }
  .reply-link {
    font-size: 12px; color: var(--uniform-navy); cursor: pointer;
    letter-spacing: 0.03em; user-select: none; transition: color 0.2s;
  }
  .reply-link:hover { color: var(--flag-red); }
  .msg-empty {
    text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 13.5px;
    border: 1px dashed var(--hairline);
  }

  /* ---- Reply form ---- */
  .reply-form {
    display: none; margin-top: 14px; padding: 14px; background: var(--paper);
    border: 1px solid var(--hairline);
  }
  .reply-form.show { display: block; }
  .reply-form input, .reply-form textarea {
    width: 100%; font-family: 'Noto Sans SC', sans-serif; font-size: 13px;
    padding: 9px 12px; border: 1px solid var(--hairline); background: #fff;
    color: var(--ink); margin-bottom: 10px;
  }
  .reply-form textarea { resize: vertical; min-height: 60px; line-height: 1.6; }
  .reply-form input:focus, .reply-form textarea:focus { outline: none; border-color: var(--flag-red); }
  .reply-form-foot { display: flex; justify-content: flex-end; gap: 8px; }
  .reply-cancel-btn, .reply-submit-btn {
    font-family: 'Noto Sans SC', sans-serif; font-size: 12.5px; font-weight: 500;
    border: none; padding: 8px 18px; cursor: pointer; letter-spacing: 0.03em;
    transition: background 0.25s, transform 0.15s;
  }
  .reply-cancel-btn { background: transparent; color: var(--ink-soft); }
  .reply-cancel-btn:hover { color: var(--ink); }
  .reply-submit-btn { background: var(--uniform-navy); color: #fff; }
  .reply-submit-btn:hover { background: var(--uniform-navy-light); }
  .reply-submit-btn:active { transform: scale(0.97); }
  .reply-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---- Replies list ---- */
  .replies-list { list-style: none; margin: 14px 0 0; padding: 14px 0 0 18px; border-left: 2px solid var(--hairline); }
  .reply-item { margin-bottom: 14px; }
  .reply-item:last-child { margin-bottom: 0; }
  .reply-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .reply-author { font-family: 'Noto Serif SC', serif; font-weight: 600; font-size: 13px; color: var(--uniform-navy); }
  .reply-time { font-size: 11px; color: var(--ink-soft); }
  .reply-body { font-size: 13px; line-height: 1.7; color: var(--ink); white-space: pre-wrap; }

  footer { padding: 40px 0 72px; text-align: center; border-top: 1px solid var(--hairline); }
  footer p { font-family: 'Noto Serif SC', serif; font-size: 14px; color: var(--ink-soft); }
  footer a { color: var(--flag-red); text-decoration: none; }

  @media (max-width: 600px) {
    .form-card { padding: 24px 20px; }
    .form-foot { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="nav-brand">临汾一中 · 2522班</div>
    <div class="nav-links">
      <a href="https://2522class.github.io/2522class">← 返回班级主页</a>
    </div>
  </div>
</nav>

<header class="board-hero">
  <div class="wrap">
    <p class="eyebrow">MESSAGE BOARD</p>
    <h1>班级留言板</h1>
    <p>写下你想对 2522 班说的话——一句祝福、一段回忆，或是毕业前想说却没来得及说的话。</p>
    <div class="seal-float">言</div>
  </div>
</header>

<hr class="rule">

<section class="board-form-sec">
  <div class="wrap">
    <div class="form-card reveal">
      <div class="form-row">
        <label for="msgName">你的名字 / 昵称</label>
        <input type="text" id="msgName" placeholder="例如：小王 / 匿名同学" maxlength="20">
      </div>
      <div class="form-row">
        <label for="msgBody">留言内容</label>
        <textarea id="msgBody" placeholder="写下你想说的话……" maxlength="300"></textarea>
      </div>
      <div class="form-foot">
        <span class="char-count"><span id="charNum">0</span>/300</span>
        <button class="submit-btn" id="submitBtn" onclick="submitMessage()">发布留言</button>
      </div>
    </div>
  </div>
</section>

<section class="board-list-sec">
  <div class="wrap">
    <div class="sec-head reveal">
      <h2>大家的留言</h2>
      <span id="msgCountLabel">共 0 条</span>
    </div>
    <ul class="msg-list" id="msgList"></ul>
  </div>
</section>



<footer>
  <div class="wrap">
    <p>回到 <a href="https://2522class.github.io/2522class">临汾一中 2522班 主页</a></p>
  </div>
</footer>

<script type="module">
  // ============================================================
  // Supabase 留言板配置
  // ============================================================
  const SUPABASE_URL = "https://oforawiawewzckdamjvb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_gCqttAFNoi4RTUuRu978tQ_xQaRp_-k";

  // ---- 滚动淡入 ----
  var reveals = document.querySelectorAll('.reveal');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  reveals.forEach(function(el) { observer.observe(el); });

  var msgList = document.getElementById('msgList');
  var msgCountLabel = document.getElementById('msgCountLabel');
  var charNum = document.getElementById('charNum');
  var msgBody = document.getElementById('msgBody');
  var msgName = document.getElementById('msgName');
  var submitBtn = document.getElementById('submitBtn');

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    if (!ts) return '刚刚';
    // 数据库存的是 UTC 时间，若字符串末尾没有时区标记（Z 或 +00:00），
    // 需要手动补上，否则浏览器会误当成本地时间解析，导致时间对不上
    var isoStr = ts;
    if (typeof ts === 'string' && !/Z$|[+-]\d\d:\d\d$/.test(ts)) {
      isoStr = ts + 'Z';
    }
    var d = new Date(isoStr);
    var m = (d.getMonth() + 1).toString().padStart(2, '0');
    var day = d.getDate().toString().padStart(2, '0');
    var hh = d.getHours().toString().padStart(2, '0');
    var mm = d.getMinutes().toString().padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day + ' ' + hh + ':' + mm;
  }

  function renderMessages(docs) {
    msgList.innerHTML = '';
    // 拆分主留言和回复
    var topLevel = docs.filter(function(m) { return !m.parent_id; });
    var repliesByParent = {};
    docs.forEach(function(m) {
      if (m.parent_id) {
        if (!repliesByParent[m.parent_id]) repliesByParent[m.parent_id] = [];
        repliesByParent[m.parent_id].push(m);
      }
    });
    Object.keys(repliesByParent).forEach(function(pid) {
      repliesByParent[pid].sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
    });

    if (topLevel.length === 0) {
      msgList.innerHTML = '<li class="msg-empty">还没有留言，来写下第一条吧～</li>';
    } else {
      topLevel.forEach(function(m, i) {
        var li = document.createElement('li');
        li.className = 'msg-item';
        li.style.animationDelay = (i * 0.05) + 's';

        var replies = repliesByParent[m.id] || [];
        var repliesHtml = '';
        if (replies.length > 0) {
          repliesHtml = '<ul class="replies-list">' + replies.map(function(r) {
            return '<li class="reply-item">' +
              '<div class="reply-head">' +
                '<span class="reply-author">' + escapeHtml(r.name) + '</span>' +
                '<span class="reply-time">' + escapeHtml(formatTime(r.created_at)) + '</span>' +
              '</div>' +
              '<div class="reply-body">' + escapeHtml(r.body) + '</div>' +
            '</li>';
          }).join('') + '</ul>';
        }

        li.innerHTML =
          '<div class="msg-head">' +
            '<span class="msg-author">' + escapeHtml(m.name) + '</span>' +
            '<span class="msg-time">' + escapeHtml(formatTime(m.created_at)) + '</span>' +
          '</div>' +
          '<div class="msg-body">' + escapeHtml(m.body) + '</div>' +
          repliesHtml +
          '<div class="msg-foot"><span class="reply-link" data-id="' + m.id + '">回复</span></div>' +
          '<div class="reply-form" id="reply-form-' + m.id + '">' +
            '<input type="text" placeholder="你的名字 / 昵称" maxlength="20" id="reply-name-' + m.id + '">' +
            '<textarea placeholder="写下你的回复……" maxlength="200" id="reply-body-' + m.id + '"></textarea>' +
            '<div class="reply-form-foot">' +
              '<button class="reply-cancel-btn" data-cancel="' + m.id + '">取消</button>' +
              '<button class="reply-submit-btn" data-submit="' + m.id + '">发送回复</button>' +
            '</div>' +
          '</div>';
        msgList.appendChild(li);
      });
    }
    msgCountLabel.textContent = '共 ' + topLevel.length + ' 条';

    // 绑定"回复"链接点击事件
    msgList.querySelectorAll('.reply-link').forEach(function(link) {
      link.addEventListener('click', function() {
        var id = link.getAttribute('data-id');
        document.getElementById('reply-form-' + id).classList.add('show');
        document.getElementById('reply-name-' + id).focus();
      });
    });
    // 绑定"取消"按钮
    msgList.querySelectorAll('[data-cancel]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-cancel');
        document.getElementById('reply-form-' + id).classList.remove('show');
      });
    });
    // 绑定"发送回复"按钮
    msgList.querySelectorAll('[data-submit]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-submit');
        window.submitReply(id, btn);
      });
    });
  }

  msgBody.addEventListener('input', function() {
    charNum.textContent = msgBody.value.length;
  });

  // 占位函数，防止异步加载导致的报错
  window.submitMessage = function() {
    submitBtn.disabled = true;
    submitBtn.textContent = '加载中...';
  };

  // ---- 加载 Supabase 库 ----
  import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm').then(function(m) {
    var supabase = m.createClient(SUPABASE_URL, SUPABASE_KEY);

    function loadMessages() {
      supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false })
        .then(function(resp) {
          if (resp.error) {
            console.error('查询错误:', resp.error);
            msgList.innerHTML = '<li class="msg-empty">留言板连接失败，请稍后重试。</li>';
            submitBtn.disabled = false;
            submitBtn.textContent = '发布留言';
          } else {
            renderMessages(resp.data);
            submitBtn.disabled = false;
            submitBtn.textContent = '发布留言';
          }
        })
        .catch(function(err) {
          console.error('网络错误:', err);
          msgList.innerHTML = '<li class="msg-empty">网络连接出错，请刷新重试。</li>';
          submitBtn.disabled = false;
          submitBtn.textContent = '发布留言';
        });
    }

    // 真正的 submitMessage 实现
    window.submitMessage = function() {
      var name = msgName.value.trim() || '匿名同学';
      var body = msgBody.value.trim();
      if (!body) {
        msgBody.style.borderColor = '#b5342a';
        msgBody.focus();
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = '发布中...';
      supabase
        .from('messages')
        .insert([{ name: name, body: body }])
        .then(function(resp) {
          if (resp.error) {
            console.error('插入错误:', resp.error);
            submitBtn.disabled = false;
            submitBtn.textContent = '发布留言';
            alert('留言发送失败，请稍后重试。错误: ' + resp.error.message);
          } else {
            msgBody.value = '';
            msgName.value = '';
            charNum.textContent = '0';
            submitBtn.disabled = false;
            submitBtn.textContent = '发布留言';
            loadMessages();
          }
        })
        .catch(function(err) {
          console.error('网络错误:', err);
          submitBtn.disabled = false;
          submitBtn.textContent = '发布留言';
          alert('网络连接出错，请稍后重试。');
        });
    };

    // 回复留言的实现
    window.submitReply = function(parentId, btnEl) {
      var nameInput = document.getElementById('reply-name-' + parentId);
      var bodyInput = document.getElementById('reply-body-' + parentId);
      var name = nameInput.value.trim() || '匿名同学';
      var body = bodyInput.value.trim();
      if (!body) {
        bodyInput.style.borderColor = '#b5342a';
        bodyInput.focus();
        return;
      }
      btnEl.disabled = true;
      btnEl.textContent = '发送中...';
      supabase
        .from('messages')
        .insert([{ name: name, body: body, parent_id: parentId }])
        .then(function(resp) {
          if (resp.error) {
            console.error('回复错误:', resp.error);
            btnEl.disabled = false;
            btnEl.textContent = '发送回复';
            alert('回复发送失败，请稍后重试。错误: ' + resp.error.message);
          } else {
            loadMessages();
          }
        })
        .catch(function(err) {
          console.error('网络错误:', err);
          btnEl.disabled = false;
          btnEl.textContent = '发送回复';
          alert('网络连接出错，请稍后重试。');
        });
    };

    loadMessages();
  }).catch(function(err) {
    console.error('库加载失败:', err);
    msgList.innerHTML = '<li class="msg-empty">库加载失败，请检查网络连接后刷新。</li>';
  });
</script>
</html>
